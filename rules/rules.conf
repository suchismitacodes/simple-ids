# ─────────────────────────────────────────────────────────
#  simple-ids — rules.conf
#  Edit these values to tune detection sensitivity.
#  Lines starting with # are comments.
# ─────────────────────────────────────────────────────────

# Number of unique destination ports a single IP must hit
# within the time window to trigger a Port Scan alert.
port_scan_threshold = 10

# Number of SYN-only packets (no ACK) from a single IP
# within the time window to trigger a SYN Flood alert.
syn_flood_threshold = 100

# Number of unique destination IPs a single source must
# ICMP-ping within the time window to trigger a Sweep alert.
icmp_sweep_threshold = 10

# Sliding window in seconds for all counters above.
time_window = 3

# Path to the alert log file (relative to where ids is run).
log_file = logs/ids.log
